version: 2

before:
  hooks:
    - go generate ./internal/docs

builds:
  - main: ./cmd/dfmicro
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X dfmicro/internal/buildinfo.Version={{.Version}} -X dfmicro/internal/buildinfo.Commit={{.ShortCommit}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz

release:
  prerelease: auto

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --bundle=${signature}
      - ${artifact}
    artifacts: checksum

changelog:
  sort: asc
  abbrev: 7
